<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Visual Trade</title>
  <link rel="stylesheet" href="/static/style.css?v=18">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">CC Visual Trade</span>
      </div>
      <nav class="nav" id="nav">
        <a href="/" class="nav-link {% if page == 'index' %}active{% endif %}">Dashboard</a>
        <a href="/trades" class="nav-link {% if page == 'trades' %}active{% endif %}">Trades</a>
        <a href="/cycles" class="nav-link {% if page == 'cycles' %}active{% endif %}">Cycles</a>
        <a href="/rules" class="nav-link {% if page == 'rules' %}active{% endif %}">Rules</a>
        <a href="/reflections" class="nav-link {% if page == 'reflections' %}active{% endif %}">Reflections</a>
      </nav>
      <div class="next-cycle-wrap">
        <span class="next-cycle-label">Next cycle</span>
        <span class="next-cycle-timer mono" id="next-cycle-timer">—</span>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div id="live-dot" class="live-dot" title="Live"></div>
    </div>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Blink the live dot only while a trading cycle is actively running
    const dot = document.getElementById('live-dot');
    let cycleRunning = false;
    setInterval(() => {
      if (cycleRunning) dot.classList.toggle('blink');
      else dot.classList.remove('blink');
    }, 1000);

    // Next cycle countdown
    let nextCycleAt = null;
    function updateCountdown() {
      const el = document.getElementById('next-cycle-timer');
      if (!nextCycleAt) return;
      const diff = Math.max(0, Math.floor((nextCycleAt - Date.now()) / 1000));
      const m = String(Math.floor(diff / 60)).padStart(2, '0');
      const s = String(diff % 60).padStart(2, '0');
      el.textContent = `${m}:${s}`;
    }
    async function fetchNextCycle() {
      try {
        const r = await fetch('/api/status');
        const d = await r.json();
        if (d.next_cycle_at) nextCycleAt = new Date(d.next_cycle_at).getTime();
        cycleRunning = !!d.cycle_running;
      } catch(e) {}
    }
    fetchNextCycle();
    setInterval(fetchNextCycle, 10000);
    setInterval(updateCountdown, 1000);
  </script>
  <script>
    const navToggle = document.getElementById('nav-toggle');
    const navEl = document.getElementById('nav');
    navToggle.addEventListener('click', () => navEl.classList.toggle('open'));
    navEl.querySelectorAll('.nav-link').forEach(a =>
      a.addEventListener('click', () => navEl.classList.remove('open'))
    );
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
