{% extends "base.html" %}
{% set page = "rules" %}

{% block content %}
{% if not rules %}
  <div class="card"><div class="muted" style="padding:2rem;text-align:center;">AGENTS.md が見つかりません。初回トレードの振り返り後に自動生成されます。</div></div>
{% else %}
<div class="card agents-md-card">
  <div class="agents-md-header">
    <span>Trading Rules</span>
    <span class="muted mono">Updated {{ rules.updated }}</span>
  </div>
  <div class="agents-md">{{ rules.html | safe }}</div>
</div>
{% endif %}
{% endblock %}
