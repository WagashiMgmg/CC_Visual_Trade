{% extends "base.html" %}
{% set page = "rules" %}

{% block content %}
{% if not rules %}
  <div class="card"><div class="muted" style="padding:2rem;text-align:center;">AGENTS.md が見つかりません。初回トレードの振り返り後に自動生成されます。</div></div>
{% else %}

<div class="rules-header card">
  <div class="rules-header-title">Trading Rules</div>
  <div class="rules-header-meta">
    <span class="rules-updated muted mono">Updated {{ rules.updated }}</span>
  </div>
</div>

<div class="card rules-md-body prose">
  {{ rules.html | safe }}
</div>

{% endif %}
{% endblock %}
