services:
  app:
    build: .
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    env_file: .env
    volumes:
      - ./charts:/app/charts
      - ./data:/app/data
      - ./prompt:/app/prompt
      # Mount Claude Code auth from host (read-only)
      - ${HOME}/.claude:/home/appuser/.claude
      - ${HOME}/.claude.json:/home/appuser/.claude.json:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
