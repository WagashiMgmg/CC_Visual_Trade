services:
  app:
    build: .
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    env_file: .env
    environment:
      - MPLCONFIGDIR=/tmp/matplotlib
    volumes:
      - ./charts:/app/charts
      - ./data:/app/data
      - ./AGENTS.md:/app/AGENTS.md
      - ./prompt:/app/prompt
      - ./src:/app/src
      - ./script:/app/script
      - ./tests:/app/tests
      - ./static:/app/static
      - ./templates:/app/templates
      # Mount Claude Code auth from host (read-only)
      - ${HOME}/.claude:/home/appuser/.claude
      - ${HOME}/.claude.json:/home/appuser/.claude.json:ro
      # Mount Gemini CLI auth from host (read-only)
      - ${HOME}/.gemini:/home/appuser/.gemini
      # Mount GitHub CLI auth from host (read-only) — run `gh auth login` on host once
      - ${HOME}/.config/gh:/home/appuser/.config/gh:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
